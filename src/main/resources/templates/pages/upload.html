<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/layout}">

<body>
	<main layout:fragment="contents">
		<h2>登録</h2>
		<h3>表示したい文章を登録します</h3>
		<form method="post" th:action="@{/add}" class="upload-form">
			<div>
				<textarea name="content"></textarea>
				<select name="categoryId">
					<option value="" selected>未分類</option>
					<option th:each="cate:${categoryList}" th:value="${cate.categoryId}" th:text="${cate.categoryName}">
					</option>
				</select>
			</div>
			<button type="submit">登録</button>
		</form>
		<div id="toast" class="toast" th:data-message="${message}"></div>
	</main>
	<aside layout:fragment="navi">
		<nav th:replace="~{pages/main::menu}"></nav>
	</aside>
</body>

</html>
