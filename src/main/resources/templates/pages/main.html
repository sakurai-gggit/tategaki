<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/layout}">
<script>
	(function () {
		const savedFont = localStorage.getItem('userFont');
		if (savedFont) {
			const targetElement = document.getElementById('main-tategaki');
			if (targetElement) {
				targetElement.classList.add(savedFont);
			}
		}
	})();
</script>

<body>
	<main layout:fragment="contents">
		<h1>main</h1>
		<article th:text="${content}" class="tategaki-content" id="main-tategaki"></article>
		<script>
				(function () {
					const savedFont = localStorage.getItem('userFont');
					if (savedFont) {
						const targetElement = document.getElementById('main-tategaki');
						if (targetElement) {
							targetElement.classList.add(savedFont);
						}
					}
				})();
			</script>
	</main>
	<aside layout:fragment="navi">
		<nav th:fragment="menu">
			<ul>
				<li>
					<a th:href="@{/upload}">登録</a>
				</li>
				<li>
					<a th:href="@{/edit}">編集</a>
				</li>
				<li>
					<a th:href="@{/settings}">設定</a>
				</li>
				<li>
					<a th:href="@{/}">top</a>
				</li>
			</ul>
		</nav>
		<a th:href="@{/main(currentId=${currentId})}">再生成</a>
	</aside>
	
</body>

</html>
