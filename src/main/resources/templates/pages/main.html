<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/layout}">

<body>
	<main layout:fragment="contents">
		<article class="tategaki-content" id="main-tategaki">
			<div class="genkou">
				
					<span th:each="char : ${chars}" th:class="${char=='¶' ? 'br' : 'masu'}"
						th:text="${char=='¶' ? '':char}">
					</span>
				
			</div>
		</article>
		<a th:href="@{/main(currentId=${currentId})}" class="reload">
			<span></span>
		</a>
	</main>
</body>

</html>
